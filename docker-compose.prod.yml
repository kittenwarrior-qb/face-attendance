# Production overlay: adds HTTPS via Caddy (automatic Let's Encrypt cert for your
# domain). api is never published to the host in docker-compose.yml itself -
# docker-compose.override.yml is what publishes it for local dev, and passing
# explicit -f flags here means that file is skipped, so only Caddy (80/443) ends
# up reachable from the internet.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Prerequisites:
#   - DNS A record for your domain pointing at this server's public IP
#   - Ports 80 and 443 open/forwarded to this server
#   - Domain configured in ./Caddyfile

services:
  api:
    restart: always

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config:
