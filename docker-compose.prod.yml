# Production overlay: adds HTTPS via Caddy (automatic Let's Encrypt cert for your
# domain) and stops publishing db/api ports directly to the internet.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Prerequisites:
#   - DNS A record for your domain pointing at this server's public IP
#   - Ports 80 and 443 open/forwarded to this server
#   - Domain configured in ./Caddyfile

services:
  db:
    ports: []  # Postgres stays internal to the compose network only

  api:
    ports: []  # only reachable through Caddy now
    restart: always

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config:
