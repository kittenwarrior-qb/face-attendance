<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Face Attendance</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --border: #2a2e38;
    --text: #e8eaed;
    --muted: #8b909c;
    --accent: #4f8cff;
    --ok: #2ecc71;
    --err: #e74c3c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 16px;
  }
  .app {
    width: 100%;
    max-width: 420px; /* mobile-first: comfortable on phones without overflow */
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  @media (min-width: 992px) {
    .app { max-width: 640px; gap: 18px; }
    .video-wrap { max-width: 480px; margin: 0 auto; }
    h1 { font-size: 22px; }
  }
  h1 {
    font-size: 18px;
    font-weight: 600;
    text-align: center;
    margin: 8px 0 0;
    color: var(--text);
  }
  .video-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 3 / 4;
    background: linear-gradient(160deg, #1c1e27, #0b0c10);
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(255,255,255,0.06);
  }
  .mirror {
    position: relative;
    width: 100%;
    height: 100%;
    transform: scaleX(-1); /* mirror for natural selfie view; capture reads real pixels regardless */
  }
  video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .status-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #ff453a;
    margin-right: 6px;
    animation: dot-pulse 1.2s ease-in-out infinite;
  }
  .status-dot.ok { background: #32d74b; animation: none; }
  @keyframes dot-pulse {
    0%, 100% { opacity: 0.35; transform: scale(0.85); }
    50% { opacity: 1; transform: scale(1); }
  }
  .status-bar {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    padding: 10px 12px;
    background: linear-gradient(transparent, rgba(0,0,0,0.75));
    font-size: 13px;
    color: #fff;
    text-align: center;
  }
  .countdown {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 88px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 2px 12px rgba(0,0,0,0.6);
    background: rgba(0,0,0,0.25);
  }
  .countdown.show { display: flex; }
  .preview-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
  }
  .preview-img.show { display: block; }
  .result-card {
    border-radius: 14px;
    padding: 14px 16px;
    background: var(--panel);
    border: 1px solid var(--border);
    display: none;
  }
  .result-card.show { display: block; }
  .result-card.ok { border-color: var(--ok); }
  .result-card.err { border-color: var(--err); }
  .result-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .result-title.ok { color: var(--ok); }
  .result-title.err { color: var(--err); }
  .result-line { font-size: 13px; color: var(--muted); margin: 2px 0; }
  .btn {
    appearance: none;
    border: none;
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    color: #fff;
    background: var(--accent);
  }
  .btn.secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }

  details {
    border: 1px solid var(--border);
    border-radius: 14px;
    background: var(--panel);
    padding: 10px 14px;
  }
  summary {
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
  }
  .register-body {
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  input[type=number] {
    width: 100%;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: #0f1115;
    color: var(--text);
    font-size: 14px;
  }
  .hint { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .badge {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--border);
    color: var(--muted);
    margin-left: 6px;
  }
</style>
</head>
<body>
<div class="app">
  <h1>🎯 Face Attendance — Chấm công khuôn mặt</h1>

  <div class="video-wrap">
    <div class="mirror">
      <video id="video" autoplay playsinline muted></video>
    </div>
    <img id="capturePreview" class="preview-img" alt="Ảnh vừa chụp">
    <div class="countdown" id="countdown"></div>
    <div class="status-bar"><span class="status-dot" id="statusDot"></span><span id="statusBar">Đang khởi động camera...</span></div>
  </div>

  <div class="row">
    <button class="btn" id="toggleScanBtn">Tạm dừng quét</button>
    <button class="btn secondary" id="switchCamBtn">Đổi camera</button>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-title" id="resultTitle"></div>
    <div class="result-line" id="resultEmployee"></div>
    <div class="result-line" id="resultScore"></div>
    <div class="result-line" id="resultAttendance"></div>
    <div class="result-line" id="resultMessage"></div>
  </div>

  <details>
    <summary>➕ Đăng ký nhân viên mới</summary>
    <div class="register-body">
      <input type="text" id="employeeIdInput" placeholder="Mã nhân viên (barcode Odoo)" autocomplete="off">
      <input type="password" id="apiKeyInput" placeholder="API key (nếu server yêu cầu)" autocomplete="off">
      <button class="btn" id="captureBtn">📸 Chụp ảnh để đăng ký</button>
      <div class="row" id="previewActions" style="display:none">
        <button class="btn secondary" id="retakeBtn">🔄 Chụp lại</button>
        <button class="btn" id="confirmRegisterBtn">✅ Xác nhận & Đăng ký</button>
      </div>
      <div class="hint" id="registerResult"></div>
    </div>
  </details>

  <p class="hint">
    Mẹo: chỉ đứng 1 người trước camera, nhìn thẳng, đủ sáng.
    Hệ thống tự quét mỗi ~1.8s và tạm nghỉ 5s sau khi chấm công thành công.
    <span class="badge">getUserMedia yêu cầu HTTPS (hoặc localhost) để hoạt động trên điện thoại</span>
  </p>
</div>

<script>
const video = document.getElementById('video');
const statusDot = document.getElementById('statusDot');
const statusBar = document.getElementById('statusBar');
const toggleScanBtn = document.getElementById('toggleScanBtn');
const switchCamBtn = document.getElementById('switchCamBtn');
const resultCard = document.getElementById('resultCard');
const resultTitle = document.getElementById('resultTitle');
const resultEmployee = document.getElementById('resultEmployee');
const resultScore = document.getElementById('resultScore');
const resultAttendance = document.getElementById('resultAttendance');
const resultMessage = document.getElementById('resultMessage');
const employeeIdInput = document.getElementById('employeeIdInput');
const apiKeyInput = document.getElementById('apiKeyInput');
const captureBtn = document.getElementById('captureBtn');
const previewActions = document.getElementById('previewActions');
const retakeBtn = document.getElementById('retakeBtn');
const confirmRegisterBtn = document.getElementById('confirmRegisterBtn');
const registerResult = document.getElementById('registerResult');
const capturePreview = document.getElementById('capturePreview');
const countdownEl = document.getElementById('countdown');

const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d');

let stream = null;
let facingMode = 'user';
let scanning = true;
let busy = false;
let cooldownUntil = 0;
let gpsCoords = null;
let capturedBlob = null;
let scanningPausedForCapture = false;

const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

// Server error `code` -> friendly Vietnamese text (server's `detail` stays
// English for logs; never shown directly to avoid mixed-language UI).
const ERROR_MESSAGES_VI = {
  NoFaceDetectedError: 'Không thấy khuôn mặt, đứng gần camera hơn nhé',
  MultipleFacesDetectedError: 'Chỉ 1 người trước camera thôi nhé',
  InvalidImageError: 'Ảnh bị lỗi, thử chụp lại',
  SpoofDetectedError: 'Phát hiện ảnh giả — vui lòng dùng khuôn mặt thật, không dùng ảnh/màn hình',
};

// Common getUserMedia rejection reasons -> friendly Vietnamese text.
const CAMERA_ERROR_MESSAGES_VI = {
  NotAllowedError: 'Bạn chưa cấp quyền camera. Vào cài đặt trình duyệt để bật quyền camera cho trang này.',
  PermissionDeniedError: 'Bạn chưa cấp quyền camera. Vào cài đặt trình duyệt để bật quyền camera cho trang này.',
  NotFoundError: 'Không tìm thấy camera trên thiết bị này.',
  NotReadableError: 'Camera đang được ứng dụng khác sử dụng, đóng ứng dụng đó rồi thử lại.',
  OverconstrainedError: 'Camera không hỗ trợ cấu hình yêu cầu.',
  SecurityError: 'Trang này cần chạy qua HTTPS (hoặc localhost) để mở được camera.',
};

function cameraErrorMessage(err) {
  return CAMERA_ERROR_MESSAGES_VI[err.name] || ('Không mở được camera (' + err.name + ')');
}

function setStatus(text) {
  statusBar.textContent = text;
}

function setStatusDot(ok) {
  statusDot.className = 'status-dot' + (ok ? ' ok' : '');
}

async function startCamera() {
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
  }
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 720 }, height: { ideal: 960 }, aspectRatio: { ideal: 3 / 4 } },
      audio: false
    });
    video.srcObject = stream;
    setStatus('Đang quét khuôn mặt...');
  } catch (err) {
    setStatus(cameraErrorMessage(err));
  }
}

function captureBlob() {
  const w = video.videoWidth, h = video.videoHeight;
  if (!w || !h) return Promise.resolve(null);
  canvas.width = w;
  canvas.height = h;
  ctx.drawImage(video, 0, 0, w, h); // real (unmirrored) pixels, regardless of CSS mirror on <video>
  return new Promise(resolve => canvas.toBlob(b => resolve(b), 'image/jpeg', 0.85));
}

function tryGetGPS() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(
    pos => { gpsCoords = { lat: pos.coords.latitude, lon: pos.coords.longitude }; },
    () => { gpsCoords = null; },
    { timeout: 4000 }
  );
}

function showResult(ok, data) {
  resultCard.classList.add('show');
  resultCard.className = 'result-card show ' + (ok ? 'ok' : 'err');
  resultTitle.className = 'result-title ' + (ok ? 'ok' : 'err');
  resultTitle.textContent = ok ? '✅ Chấm công thành công' : '❌ Không nhận diện được';
  resultEmployee.textContent = data.employee_id != null
    ? (data.employee_name ? `${data.employee_name} (#${data.employee_id})` : `#${data.employee_id}`)
    : '';
  resultScore.textContent = data.score != null ? ('Độ tương đồng: ' + data.score.toFixed(3)) : '';
  if (data.attendance) {
    const action = data.attendance.action === 'check_in' ? 'Check-in' : 'Check-out';
    resultAttendance.textContent = action + ' lúc ' + new Date(data.attendance.timestamp).toLocaleTimeString('vi-VN');
  } else {
    resultAttendance.textContent = '';
  }
  resultMessage.textContent = data.message || '';
}

async function scanLoop() {
  if (!scanning || busy || Date.now() < cooldownUntil) {
    requestAnimationFrame(() => setTimeout(scanLoop, 300));
    return;
  }
  busy = true;
  try {
    const blob = await captureBlob();
    if (blob) {
      const form = new FormData();
      form.append('file', blob, 'scan.jpg');
      if (gpsCoords) {
        form.append('latitude', gpsCoords.lat);
        form.append('longitude', gpsCoords.lon);
      }
      const res = await fetch('/verify', { method: 'POST', body: form });
      const data = await res.json();

      if (data.success) {
        setStatusDot(true);
        setStatus((data.employee_name || ('#' + data.employee_id)) + ' — đã chấm công');
        showResult(true, data);
        if (navigator.vibrate) navigator.vibrate(120);
        cooldownUntil = Date.now() + 5000;
      } else {
        setStatusDot(false);
        setStatus(res.status === 422 ? (ERROR_MESSAGES_VI[data.code] || 'Chỉnh lại vị trí khuôn mặt') : 'Đang tìm khuôn mặt...');
      }
    }
  } catch (e) {
    setStatus('Lỗi kết nối server: ' + e.message);
  } finally {
    busy = false;
    setTimeout(scanLoop, 1800);
  }
}

toggleScanBtn.addEventListener('click', () => {
  scanning = !scanning;
  toggleScanBtn.textContent = scanning ? 'Tạm dừng quét' : 'Tiếp tục quét';
  setStatus(scanning ? 'Đang quét khuôn mặt...' : 'Đã tạm dừng');
});

switchCamBtn.addEventListener('click', () => {
  facingMode = facingMode === 'user' ? 'environment' : 'user';
  startCamera();
});

function pauseScanForCapture() {
  scanningPausedForCapture = !scanning; // remember if it was already paused by the user
  scanning = false;
}

function resumeScanAfterCapture() {
  if (!scanningPausedForCapture) scanning = true;
}

async function runCountdown() {
  countdownEl.classList.add('show');
  for (const n of [3, 2, 1]) {
    countdownEl.textContent = n;
    await sleep(700);
  }
  countdownEl.textContent = '📸';
  await sleep(200);
  countdownEl.classList.remove('show');
}

captureBtn.addEventListener('click', async () => {
  const employeeId = employeeIdInput.value;
  if (!employeeId) {
    registerResult.textContent = 'Nhập mã nhân viên trước đã.';
    return;
  }
  captureBtn.disabled = true;
  pauseScanForCapture();
  registerResult.textContent = '';

  await runCountdown();
  capturedBlob = await captureBlob();

  if (!capturedBlob) {
    registerResult.textContent = 'Không chụp được ảnh, thử lại.';
    captureBtn.disabled = false;
    resumeScanAfterCapture();
    return;
  }

  capturePreview.src = URL.createObjectURL(capturedBlob);
  capturePreview.classList.add('show');
  captureBtn.style.display = 'none';
  previewActions.style.display = 'flex';
});

retakeBtn.addEventListener('click', () => {
  capturePreview.classList.remove('show');
  previewActions.style.display = 'none';
  captureBtn.style.display = '';
  captureBtn.disabled = false;
  capturedBlob = null;
  registerResult.textContent = '';
});

confirmRegisterBtn.addEventListener('click', async () => {
  const employeeId = employeeIdInput.value;
  if (!capturedBlob) return;

  confirmRegisterBtn.disabled = true;
  retakeBtn.disabled = true;
  registerResult.textContent = 'Đang đăng ký...';
  try {
    const form = new FormData();
    form.append('employee_id', employeeId);
    form.append('file', capturedBlob, 'register.jpg');
    const headers = {};
    if (apiKeyInput.value) headers['X-API-Key'] = apiKeyInput.value;
    const res = await fetch('/register', { method: 'POST', body: form, headers });
    const data = await res.json();
    registerResult.textContent = data.success
      ? (`✅ Đăng ký thành công: ${data.employee_name} (#${data.employee_id})`)
      : ('❌ ' + (ERROR_MESSAGES_VI[data.code] || (res.status === 401 ? 'Sai API key' : 'Đăng ký thất bại')));

    if (data.success) {
      capturePreview.classList.remove('show');
      previewActions.style.display = 'none';
      captureBtn.style.display = '';
      capturedBlob = null;
    }
  } catch (e) {
    registerResult.textContent = 'Lỗi: ' + e.message;
  } finally {
    captureBtn.disabled = false;
    confirmRegisterBtn.disabled = false;
    retakeBtn.disabled = false;
    resumeScanAfterCapture();
  }
});

tryGetGPS();
startCamera().then(scanLoop);
</script>
</body>
</html>
