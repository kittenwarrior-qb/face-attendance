# Auto-loaded by plain `docker compose up` (local dev only).
# Publishes the API port directly to the host for convenience while developing.
#
# Production deploys explicitly pass -f flags (docker compose -f docker-compose.yml
# -f docker-compose.prod.yml ...), which skips this file automatically - so api
# stays unpublished and only Caddy (80/443) is reachable from the internet.

services:
  api:
    ports:
      - "8000:8000"
